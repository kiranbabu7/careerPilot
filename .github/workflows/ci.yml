name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend check and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: npm run check

      - name: Run production build
        run: npm run build

  docker-smoke:
    name: Docker production smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DJANGO_SECRET_KEY: ci-docker-smoke-secret-key-not-for-production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      POSTGRES_DB: careerpilot
      POSTGRES_USER: careerpilot
      POSTGRES_PASSWORD: careerpilot
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ""
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          DJANGO_SECRET_KEY=ci-docker-smoke-secret-key-not-for-production
          DJANGO_DEBUG=false
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
          POSTGRES_DB=careerpilot
          POSTGRES_USER=careerpilot
          POSTGRES_PASSWORD=careerpilot
          NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=
          GOOGLE_OAUTH_CLIENT_ID=
          EOF

      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

      - name: Start production stack
        run: docker compose -f docker-compose.prod.yml up -d --wait

      - name: Verify backend readiness
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors \
            http://localhost:8000/api/v1/health/ready/

      - name: Verify frontend responds
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors \
            http://localhost:3000/

      - name: Stop production stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
